<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk Baru - POTTE HOUSE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #c8623c; /* Terakota khas Potte House */
            --primary-hover: #b05432;
            --bg-color: #fcfaf8; /* Putih tulang */
            --card-bg: #ffffff;
            --text-dark: #2d2d2d;
            --text-muted: #6b6b6b;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .form-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.02);
            box-sizing: border-box;
        }

        .header-section {
            margin-bottom: 30px;
            text-align: center;
        }

        .header-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--text-dark);
            margin: 0 0 8px 0;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* Form Group Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control, .form-select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
            background-color: #fdfdfd;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(200, 98, 60, 0.15);
            background-color: white;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236b6b6b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
            cursor: pointer;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
        }

        .input-with-prefix {
            padding-left: 45px;
        }

        /* Buttons Styling */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px dashed var(--border-color);
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            flex: 2;
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 98, 60, 0.2);
        }

        .btn-secondary {
            flex: 1;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="form-card">
        
        <div class="header-section">
            <h2><i class="fas fa-plus-circle" style="color: var(--primary-color); margin-right: 8px;"></i> Tambah Produk</h2>
            <p>Masukkan detail menu atau oleh-oleh baru ke dalam sistem.</p>
        </div>

        <form th:action="@{/stok/tambah}" th:object="${product}" method="post">
            
            <div class="form-group">
                <label for="name">Nama Produk</label>
                <input type="text" id="name" class="form-control" th:field="*{name}" placeholder="Misal: Bika Ambon Zulaikha" required>
            </div>
            
            <div class="form-group">
                <label for="category">Kategori</label>
                <select id="category" class="form-select" th:field="*{category}" required>
                    <option value="" disabled selected>-- Pilih Kategori --</option>
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                    <option value="Souvenir">Souvenir</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label for="price">Harga Satuan</label>
                    <div class="input-group">
                        <span class="input-prefix">Rp</span>
                        <input type="number" id="price" class="form-control input-with-prefix" th:field="*{price}" min="0" placeholder="0" required>
                    </div>
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label for="stock">Stok Awal</label>
                    <input type="number" id="stock" class="form-control" th:field="*{stock}" min="0" placeholder="0" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Deskripsi Produk (Opsional)</label>
                <textarea id="description" class="form-control" th:field="*{description}" rows="3" placeholder="Tuliskan deskripsi singkat mengenai produk ini..."></textarea>
            </div>

            <div class="action-buttons">
                <a href="/stok" class="btn btn-secondary">Batal</a>
                <button type="submit" class="btn btn-primary">Simpan Produk</button>
            </div>
            
        </form>

    </div>

</body>
</html>
