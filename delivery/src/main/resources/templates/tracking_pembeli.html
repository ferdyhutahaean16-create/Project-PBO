<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Pesanan - POTTE HOUSE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #c8623c; /* Terakota khas Potte House */
            --primary-hover: #b05432;
            --bg-color: #fcfaf8; /* Putih tulang */
            --card-bg: #ffffff;
            --text-dark: #2d2d2d;
            --text-muted: #6b6b6b;
            --border-color: #e5e7eb;
            --soft-orange: #fff8f5;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 40px 20px;
        }

        .container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            max-width: 800px; 
            margin: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Header Section */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed var(--border-color);
        }

        .header-title h2 {
            font-family: 'Playfair Display', serif;
            color: var(--text-dark);
            margin: 0 0 5px 0;
            font-size: 26px;
        }

        .header-title p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .btn-back {
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .btn-back:hover {
            color: var(--primary-color);
            background: var(--soft-orange);
        }

        /* Order Card Items */
        .order-item { 
            background: #ffffff;
            border: 1px solid var(--border-color); 
            padding: 20px 25px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.04);
            border-color: #d1d5db;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f9fafb;
            padding-bottom: 12px;
        }

        .order-id {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .order-id span {
            color: var(--primary-color);
        }

        .order-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .order-details p {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .order-details .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Status Badges */
        .status-badge { 
            display: inline-flex; 
            align-items: center;
            padding: 6px 12px; 
            border-radius: 20px; 
            font-weight: 700; 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .bg-dikemas { background-color: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
        .bg-diperjalanan { background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .bg-sampai { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        /* Review Button */
        .btn-review {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: var(--primary-color); 
            color: white; 
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-review:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(200, 98, 60, 0.2);
        }

        /* Empty State */
        .empty-state {
            text-align: center; 
            color: var(--text-muted); 
            padding: 50px 20px;
            background: #fdfdfd;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>
    
    <div class="container">
        
        <div class="header-section">
            <div class="header-title">
                <h2>Tracking Pesanan</h2>
                <p>Pantau status pengiriman pesanan Anda secara real-time.</p>
            </div>
            <a href="/dashboard/pembeli" class="btn-back">
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
        </div>

        <div th:each="order : ${orders}" class="order-item">
            
            <div class="order-header">
                <h4 class="order-id">Order ID: <span>#KM-<span th:text="${order.id}"></span></span></h4>
                <span th:classappend="${order.status.name() == 'DIKEMAS' ? 'bg-dikemas' : (order.status.name() == 'DIPERJALANAN' ? 'bg-diperjalanan' : 'bg-sampai')}" 
                      class="status-badge" th:text="${order.status}">
                </span>
            </div>

            <div class="order-body">
                <div class="order-details">
                    <p>Total Belanja</p>
                    <div class="price">Rp <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span></div>
                </div>
                
                <div th:if="${order.status.name() == 'SAMPAI'}">
                    <a th:href="@{'/ulasan/tulis/' + ${order.id}}" class="btn-review">
                        <i class="fas fa-star" style="color: #fde047;"></i> Beri Ulasan
                    </a>
                </div>
            </div>

        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
            <i class="fas fa-box-open" style="font-size: 40px; color: #cbd5e1; margin-bottom: 15px; display: block;"></i>
            Belum ada riwayat pesanan saat ini.<br>Ayo mulai berbelanja di Potte House!
        </div>
        
    </div>

</body>
</html>
