<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - POTTE HOUSE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #c8623c; /* Terakota khas Potte House */
            --primary-hover: #b05432;
            --bg-color: #fcfaf8; /* Putih tulang */
            --card-bg: #ffffff;
            --text-dark: #2d2d2d;
            --text-muted: #6b6b6b;
            --border-color: #e5e7eb;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 45px 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            width: 100%;
            max-width: 400px; 
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
        }

        .brand-logo h1 span {
            color: var(--primary-color);
            font-style: italic;
        }

        .brand-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* Alerts Styling */
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #86efac;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
            background-color: #fdfdfd;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #adb5bd;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(200, 98, 60, 0.15);
            background-color: white;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px;
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.3s ease;
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 98, 60, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-link {
            text-align: center; 
            font-size: 14px; 
            color: var(--text-muted);
            margin-top: 25px;
        }

        .footer-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer-link a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="brand-logo">
            <h1>POTTE <span>House</span></h1>
            <p>Selamat datang kembali!</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> Email atau Password salah!
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> Anda berhasil logout.
        </div>
        <div th:if="${param.registered}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> Registrasi berhasil! Silakan login.
        </div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password" placeholder="Masukkan kata sandi Anda" required>
            </div>
            
            <button type="submit">Masuk ke Akun</button>
        </form>

        <div class="footer-link">
            Belum punya akun? <a href="/register">Daftar di sini</a>
        </div>

    </div>

</body>
</html>
