<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Kuliner Medan</title>
    <style>
        body { font-family: Arial; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 20px 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Daftar Akun Baru</h2>
        <div th:if="${param.error}" style="color: red;">Email sudah digunakan!</div>
        
        <form th:action="@{/register}" method="post">
            <input type="text" name="username" placeholder="Nama Lengkap" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <select name="role" required>
                <option value="PEMBELI">Pembeli</option>
                <option value="PENJUAL">Toko / Penjual</option>
            </select>
            <button type="submit">Daftar Sekarang</button>
        </form>
        <p style="text-align: center; font-size: 14px;">Sudah punya akun? <a href="/login">Login di sini</a></p>
    </div>
</body>
</html>
