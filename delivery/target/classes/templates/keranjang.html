<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Keranjang Belanja - Kuliner Medan</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
        .btn-back { background: #007bff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; display: inline-block; margin-bottom: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Keranjang Belanja Saya 🛒</h2>
        <a href="/produk" class="btn-back">Kembali ke Katalog</a>

        <table>
            <thead>
                <tr>
                    <th>Nama Produk</th>
                    <th>Harga Satuan</th>
                    <th>Jumlah</th>
                    <th>Subtotal</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.product.name}">Nama</td>
                    <td th:text="'Rp ' + ${item.product.price}">Harga</td>
                    <td th:text="${item.quantity}">0</td>
                    <td th:text="'Rp ' + (${item.product.price} * ${item.quantity})">Subtotal</td>
                    <td>
                        <a th:href="@{/keranjang/hapus/{id}(id=${item.id})}" class="btn-delete">Hapus</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(cartItems)}">
                    <td colspan="5" style="text-align: center;">Keranjang Anda masih kosong.</td>
                </tr>
            </tbody>
        </table>
        <form th:action="@{/order/checkout}" method="post" style="margin-top: 20px; text-align: right;">
            <button type="submit" class="btn-back" style="background: #ff9800; font-weight: bold;">Proses Checkout Pesanan ➔</button>
        </form>
    </div>
</body>
</html>
