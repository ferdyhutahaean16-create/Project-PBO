<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POTTE HOUSE - Cafe & All Day Dining</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Desain Warna Warm khas Restoran */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            color: #333;
        }

        /* NAVBAR ATAS (Menu Navigasi) */
        .navbar {
            background-color: #ffffff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 900;
            color: #2c3e50;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .navbar-brand span {
            color: #d35400;
            /* Warna Oranye Terbakar */
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: #d35400;
        }

        .nav-link i {
            margin-right: 6px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .role-badge {
            background: #2c3e50;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-logout {
            color: #e74c3c;
            text-decoration: none;
            font-size: 18px;
            transition: 0.2s;
        }

        .btn-logout:hover {
            color: #c0392b;
            transform: scale(1.1);
        }

        /* BANNER RESTORAN (Hero Image) */
        .hero {
            /* Menggunakan gambar restoran dari Unsplash sebagai background placeholder */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover;
            color: white;
            text-align: center;
            padding: 80px 20px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 42px;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
            font-weight: 800;
        }

        .hero p {
            font-size: 18px;
            margin: 0;
            opacity: 0.9;
            font-weight: 300;
        }

        /* AREA DAFTAR MENU */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 25px;
            border-bottom: 3px solid #d35400;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* GRID KARTU MAKANAN */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .food-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .food-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .food-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #eee;
        }

        .food-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .food-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin: 0 0 8px 0;
        }

        .food-category {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .food-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .food-price {
            font-size: 18px;
            font-weight: 800;
            color: #d35400;
        }

        .btn-add-cart {
            background: #d35400;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-add-cart:hover {
            background: #b03a00;
        }

        /* JIKA MENU KOSONG */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">POTTE <span>HOUSE</span></a>

        <div class="nav-links">
            <a href="#menu-makanan" class="nav-link"><i class="fas fa-utensils"></i> Menu</a>
            <a href="/keranjang" class="nav-link"><i class="fas fa-shopping-basket"></i> Keranjang</a>
            <a href="/ongkir" class="nav-link"><i class="fas fa-motorcycle"></i> Cek Ongkir</a>
            <a href="/order/tracking" class="nav-link"><i class="fas fa-receipt"></i> Status Pesanan</a>
        </div>

        <div class="nav-right">
            <span class="role-badge" th:text="${roleName}">PEMBELI</span>
            <a href="/login?logout" class="btn-logout" title="Keluar"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <div class="hero">
        <h1>POTTE HOUSE CAFE</h1>
        <p>All Day Dining • Bahan Segar • Rasa Tak Terlupakan</p>
    </div>

    <div class="container" id="menu-makanan">
        <h2 class="section-title">Rekomendasi Menu Kami</h2>

        <div class="food-grid">
            <div class="food-card" th:each="prod : ${products}">

                <img th:if="${prod.imageBase64 != null}" th:src="'data:image/jpeg;base64,' + ${prod.imageBase64}"
                    alt="Foto Menu" class="food-img">

                <img th:if="${prod.imageBase64 == null}"
                    th:src="'https://ui-avatars.com/api/?name=' + ${prod.name} + '&background=random&color=fff&size=300'"
                    alt="Foto Menu" class="food-img">

                <div class="food-info">
                    <div>
                        <h3 class="food-title" th:text="${prod.name}">Nama Menu</h3>
                        <div class="food-category" th:text="${prod.category}">Kategori</div>
                    </div>
                    <div class="food-bottom">
                        <span class="food-price"
                            th:text="'Rp ' + ${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</span>

                        <a th:href="@{/keranjang/tambah/{id}(id=${prod.id})}" class="btn-add-cart">
                            <i class="fas fa-plus"></i> Pesan
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(products)}" class="empty-state">
                <i class="fas fa-store-slash" style="font-size: 48px; margin-bottom: 15px; color: #ccc;"></i>
                <h3>Belum ada menu yang tersedia.</h3>
            </div>
        </div>
    </div>

</body>

</html>
