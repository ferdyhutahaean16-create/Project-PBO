<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Stok Produk - POTTE HOUSE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #c8623c; /* Terakota khas Potte House */
            --primary-hover: #b05432;
            --bg-color: #fcfaf8; /* Putih tulang */
            --card-bg: #ffffff;
            --text-dark: #2d2d2d;
            --text-muted: #6b6b6b;
            --border-color: #e5e7eb;
            --soft-orange: #fff8f5;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .form-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.02);
            box-sizing: border-box;
        }

        .header-section {
            margin-bottom: 25px;
            text-align: center;
        }

        .header-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--text-dark);
            margin: 0 0 8px 0;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        /* Product Info Card */
        .info-box {
            background-color: var(--soft-orange);
            border: 1px solid #f2e6e1;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .info-title {
            margin: 0 0 12px 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            font-family: 'Playfair Display', serif;
            border-bottom: 1px dashed #e2d1c9;
            padding-bottom: 10px;
        }

        .info-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-detail:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .detail-value {
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-danger { background-color: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
        .badge-warning { background-color: #fffbeb; color: #d97706; border: 1px solid #fcd34d; }
        .badge-success { background-color: #f0fdf4; color: #166534; border: 1px solid #86efac; }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            background-color: #fdfdfd;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(200, 98, 60, 0.15);
            background-color: white;
        }

        /* Buttons Styling */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            flex: 2;
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(200, 98, 60, 0.2);
        }

        .btn-secondary {
            flex: 1;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="form-card">
        
        <div class="header-section">
            <h2><i class="fas fa-edit" style="color: var(--primary-color); margin-right: 8px;"></i> Update Stok</h2>
            <p>Perbarui jumlah ketersediaan produk ini.</p>
        </div>

        <div class="info-box">
            <h3 th:text="${product.name}" class="info-title">Nama Produk</h3>
            
            <div class="info-detail">
                <span class="detail-label">Kategori</span>
                <span class="detail-value" th:text="${product.category}">Kategori</span>
            </div>
            
            <div class="info-detail">
                <span class="detail-label">Stok Saat Ini</span>
                <span class="detail-value" th:text="${product.stock} + ' unit'">0 unit</span>
            </div>
            
            <div class="info-detail" style="margin-top: 10px;">
                <span class="detail-label">Status</span>
                <span>
                    <span th:if="${product.stock <= 0}" class="status-badge badge-danger">Habis</span>
                    <span th:if="${product.stock > 0 and product.stock <= 5}" class="status-badge badge-warning">Hampir Habis</span>
                    <span th:if="${product.stock > 5}" class="status-badge badge-success">Tersedia</span>
                </span>
            </div>
        </div>

        <form th:action="@{/stok/update/{id}(id=${product.id})}" method="post">
            
            <div class="form-group">
                <label for="jumlahBaru">Jumlah Stok Baru</label>
                <input type="number" id="jumlahBaru" class="form-control" name="jumlahBaru" th:value="${product.stock}" min="0" required>
            </div>

            <div class="action-buttons">
                <a href="/stok" class="btn btn-secondary">Batal</a>
                <button type="submit" class="btn btn-primary">Simpan Stok</button>
            </div>
            
        </form>

    </div>

</body>
</html>
