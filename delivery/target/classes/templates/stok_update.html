<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Stok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2>✏️ Update Stok Produk</h2>

    <div class="card mb-3">
        <div class="card-body">
            <h5 th:text="${product.name}" class="card-title"></h5>
            <p class="card-text">
                Kategori: <strong th:text="${product.category}"></strong><br>
                Stok saat ini: <strong th:text="${product.stock}"></strong> unit<br>
                Status:
                <strong th:if="${product.stock <= 0}" class="text-danger">Habis</strong>
                <strong th:if="${product.stock > 0 and product.stock <= 5}" class="text-warning">Hampir Habis</strong>
                <strong th:if="${product.stock > 5}" class="text-success">Tersedia</strong>
            </p>
        </div>
    </div>

    <form th:action="@{/stok/update/{id}(id=${product.id})}" method="post">
        <div class="mb-3">
            <label class="form-label">Jumlah Stok Baru</label>
            <input type="number" class="form-control" name="jumlahBaru"
                   th:value="${product.stock}" min="0" required>
        </div>
        <button type="submit" class="btn btn-warning">Update Stok</button>
        <a href="/stok" class="btn btn-secondary ms-2">Batal</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
