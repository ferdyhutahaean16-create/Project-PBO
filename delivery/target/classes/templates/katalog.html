<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Menu & Oleh-oleh - POTTE HOUSE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #c8623c; /* Terakota khas Potte House */
            --primary-hover: #b05432;
            --bg-color: #fcfaf8; /* Putih tulang */
            --card-bg: #ffffff;
            --text-dark: #2d2d2d;
            --text-muted: #6b6b6b;
            --border-color: #f1f3f5;
            --soft-orange: #fff8f5;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER SECTION */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            background: var(--card-bg);
            padding: 25px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .header-title h2 {
            margin: 0 0 5px 0;
            color: var(--text-dark);
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            letter-spacing: 0.5px;
        }
        
        .header-title p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(200, 98, 60, 0.2);
        }

        .btn-add:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-back {
            background: #f1f5f9;
            color: #475569;
        }
        
        .btn-back:hover {
            background: #e2e8f0;
            color: var(--text-dark);
        }

        /* GRID PRODUK */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 30px;
        }

        /* KARTU PRODUK */
        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: var(--soft-orange);
            border-bottom: 1px solid var(--border-color);
        }

        .product-content {
            padding: 22px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            font-family: 'Playfair Display', serif;
        }

        .product-seller {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .product-seller i {
            color: var(--primary-color);
            opacity: 0.8;
        }

        .product-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            margin: auto 0 8px 0; /* Auto margin pushes it to bottom if title is short */
        }

        .product-stock {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .product-stock strong {
            color: var(--text-dark);
        }

        /* TOMBOL AKSI DALAM KARTU */
        .action-group {
            display: flex;
            gap: 10px;
            border-top: 1px dashed var(--border-color);
            padding-top: 18px;
        }

        .btn-action {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn-cart {
            background: var(--primary-color);
            color: white;
            flex: 2;
        }
        
        .btn-cart:hover {
            background: var(--primary-hover);
        }

        .btn-edit {
            background: #fdf6e3;
            color: #d97706;
        }
        
        .btn-edit:hover {
            background: #fef3c7;
            color: #b45309;
        }

        .btn-delete {
            background: #fef2f2;
            color: #ef4444;
        }
        
        .btn-delete:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            color: var(--text-muted);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px dashed #cbd5e1;
            margin-top: 20px;
        }
        
        .empty-state h3 {
            color: var(--text-dark);
            margin: 10px 0 5px 0;
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>

<body>
    
    <div class="container">
        <div class="header-section">
            <div class="header-title">
                <h2>Katalog Produk Potte House</h2>
                <p>Jelajahi menu cafe dan pusat oleh-oleh khas kami.</p>
            </div>
            
            <div class="header-actions">
                <a th:if="${currentRole == 'ADMIN' or currentRole == 'PENJUAL'}" href="/produk/tambah" class="btn btn-add">
                    <i class="fas fa-plus"></i> Tambah Produk
                </a>
                <a href="/dashboard" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i> Kembali
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
            <i class="fas fa-basket-shopping" style="font-size: 56px; color: #e2e8f0; margin-bottom: 15px;"></i>
            <h3>Katalog Masih Kosong</h3>
            <p>Belum ada produk oleh-oleh yang ditambahkan ke dalam sistem saat ini.</p>
        </div>

        <div class="product-grid" th:if="${not #lists.isEmpty(products)}">
            
            <div class="product-card" th:each="prod : ${products}">
                <span class="category-badge" th:text="${prod.category}">Kategori</span>

                <img th:src="'https://ui-avatars.com/api/?name=' + ${prod.name} + '&background=fef3c7&color=c8623c&size=300'"
                    alt="Foto Produk" class="product-image">

                <div class="product-content">
                    <h3 class="product-title" th:text="${prod.name}">Nama Produk</h3>

                    <div class="product-seller">
                        <i class="fas fa-store"></i> Potte House Oleh-Oleh
                    </div>

                    <p class="product-price"
                        th:text="'Rp ' + ${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</p>
                    <p class="product-stock">Tersedia: <strong th:text="${prod.stock}">0</strong> stok</p>

                    <div class="action-group">
                        <a th:if="${currentRole == 'PEMBELI'}" th:href="@{/keranjang/tambah/{id}(id=${prod.id})}"
                            class="btn-action btn-cart">
                            <i class="fas fa-cart-plus"></i> Beli
                        </a>

                        <a th:if="${currentRole == 'ADMIN' or currentRole == 'PENJUAL'}"
                            th:href="@{/produk/edit/{id}(id=${prod.id})}" class="btn-action btn-edit" title="Edit Produk">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a th:if="${currentRole == 'ADMIN' or currentRole == 'PENJUAL'}"
                            th:href="@{/produk/hapus/{id}(id=${prod.id})}" class="btn-action btn-delete"
                            onclick="return confirm('Apakah Anda yakin ingin menghapus produk ini secara permanen?')" title="Hapus Produk">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </div>
                </div>
            </div> </div> </div>

</body>

</html>
