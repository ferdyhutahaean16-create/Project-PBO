<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Kuliner Medan</title>
    <style>
        body { font-family: Arial; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 20px 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login Sistem</h2>
        <div th:if="${param.error}" style="color: red;">Email atau Password salah!</div>
        <div th:if="${param.logout}" style="color: green;">Anda berhasil logout.</div>
        <div th:if="${param.registered}" style="color: green;">Registrasi berhasil! Silakan login.</div>
        
        <form th:action="@{/login}" method="post">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Masuk</button>
        </form>
        <p style="text-align: center; font-size: 14px;">Belum punya akun? <a href="/register">Daftar di sini</a></p>
    </div>
</body>
</html>
