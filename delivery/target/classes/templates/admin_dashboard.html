<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel - Kuliner Medan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #343a40; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main-content { margin-left: 290px; padding: 20px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-delete { color: white; background: #dc3545; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 12px; }
        .header-stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { padding: 20px; background: #007bff; color: white; border-radius: 8px; flex: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <hr>
    <p>Dashboard Utama</p>
    <p>Kelola Pengguna</p>
    <p>Pantau Produk</p>
    <p>Laporan Transaksi</p>
    <br>
    <a href="/login?logout" style="color: #ffc107;">Logout</a>
</div>

<div class="main-content">
    <h1>Dashboard Pengelola Sistem</h1>

    <div class="header-stats">
        <div class="stat-box">
            <h3>Total Pengguna</h3>
            <p th:text="${users.size()}">0</p>
        </div>
        <div class="stat-box" style="background: #28a745;">
            <h3>Total Produk</h3>
            <p th:text="${products.size()}">0</p>
        </div>
        <div class="stat-box" style="background: #ffc107; color: black;">
            <h3>Total Pesanan</h3>
            <p th:text="${orders.size()}">0</p>
        </div>
    </div>

    <h3>Daftar Pengguna Sistem</h3>
    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Email</th>
                <th>Role</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.username}">Nama</td>
                <td th:text="${user.email}">Email</td>
                <td><span th:text="${user.role}">ROLE</span></td>
                <td>
                    <a th:href="@{'/admin/user/delete/' + ${user.id}}" class="btn-delete" onclick="return confirm('Hapus user ini?')">Hapus</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
