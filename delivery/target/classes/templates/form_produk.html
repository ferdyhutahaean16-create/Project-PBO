<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Menu - POTTE HOUSE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn-submit { background: #d35400; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px;}
        .btn-submit:hover { background: #b03a00; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🍽️ Form Menu POTTE HOUSE</h2>
        
        <form th:action="@{/produk/simpan}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label>Nama Menu</label>
                <input type="text" th:field="*{name}" required placeholder="Contoh: Nasi Goreng Spesial">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select th:field="*{category}" required>
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                    <option value="Snack">Snack / Dessert</option>
                </select>
            </div>
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" th:field="*{price}" required min="0">
            </div>
            <div class="form-group">
                <label>Stok Awal</label>
                <input type="number" th:field="*{stock}" required min="0">
            </div>
            
            <div class="form-group">
                <label>Upload Foto Menu (Opsional)</label>
                <input type="file" name="fileFoto" accept="image/png, image/jpeg, image/jpg">
            </div>

            <button type="submit" class="btn-submit">Simpan Menu</button>
            <a href="/produk" class="btn-cancel">Batal & Kembali</a>
        </form>
    </div>
</body>
</html>
