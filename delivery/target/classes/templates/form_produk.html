<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Produk - Kuliner Medan</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f4f9; }
        .form-container { background: white; padding: 20px; border-radius: 8px; width: 400px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 th:text="${product.id == null ? 'Tambah Produk Baru' : 'Edit Produk'}">Form Produk</h2>
        
        <form th:action="@{/produk/simpan}" th:object="${product}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <label>Nama Produk:</label>
            <input type="text" th:field="*{name}" required placeholder="Contoh: Bika Ambon Zulaikha">
            
            <label>Kategori:</label>
            <select th:field="*{category}" required>
                <option value="Makanan">Makanan</option>
                <option value="Minuman">Minuman</option>
                <option value="Souvenir">Souvenir</option>
            </select>
            
            <label>Harga (Rp):</label>
            <input type="number" th:field="*{price}" required>
            
            <label>Stok Awal:</label>
            <input type="number" th:field="*{stock}" required>
            
            <label>Deskripsi:</label>
            <textarea th:field="*{description}" rows="3"></textarea>
            
            <button type="submit">Simpan Data</button>
            <a href="/produk" style="display:block; text-align:center; margin-top:10px;">Batal</a>
        </form>
    </div>
</body>
</html>
