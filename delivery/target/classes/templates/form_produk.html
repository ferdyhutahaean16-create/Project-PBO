<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Menu - POTTE HOUSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding-top: 50px; margin: 0;}
        .card { background: white; padding: 30px 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 400px; border-top: 4px solid #d35400;}
        h2 { color: #2c3e50; text-align: center; margin-top: 0; margin-bottom: 25px; font-weight: 800;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px;}
        input:focus, select:focus { border-color: #d35400; outline: none; }
        .btn-submit { background: #d35400; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; transition: 0.2s;}
        .btn-submit:hover { background: #b03a00; transform: translateY(-2px);}
        .btn-cancel { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #888; font-size: 14px; font-weight: 600;}
        .btn-cancel:hover { color: #d35400; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🍽️ Form Menu Baru</h2>
        
        <form th:action="@{/produk/simpan}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label>Nama Menu POTTE HOUSE</label>
                <input type="text" th:field="*{name}" placeholder="Contoh: Nasi Goreng Spesial" required>
            </div>
            
            <div class="form-group">
                <label>Kategori Hidangan</label>
                <select th:field="*{category}" required>
                    <option value="" disabled selected>-- Pilih Kategori --</option>
                    <option value="Makanan">Makanan Utama</option>
                    <option value="Minuman">Minuman & Kopi</option>
                    <option value="Snack">Snack / Dessert</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Harga Jual (Rp)</label>
                <input type="number" th:field="*{price}" placeholder="Contoh: 25000" required>
            </div>
            
            <div class="form-group">
                <label>Stok Awal</label>
                <input type="number" th:field="*{stock}" placeholder="Jumlah ketersediaan hari ini" required>
            </div>
            
            <div class="form-group">
                <label>Foto Menu (Opsional)</label>
                <input type="file" name="fileFoto" accept="image/png, image/jpeg, image/jpg">
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> Simpan Menu ke Katalog
            </button>
            <a href="/produk" class="btn-cancel">Batal & Kembali</a>
        </form>
    </div>
</body>
</html>
