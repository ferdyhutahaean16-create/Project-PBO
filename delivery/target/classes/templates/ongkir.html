<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Ongkos Kirim - Potte House</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #c8623c; /* Warna oranye terakota khas Potte House */
            --primary-hover: #b05432;
            --bg-color: #fcfaf8; /* Putih tulang/hangat untuk background */
            --card-bg: #ffffff;
            --text-dark: #2d2d2d;
            --text-muted: #6b6b6b;
            --border-color: #e5e7eb;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); 
            box-sizing: border-box;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--text-dark);
            font-size: 28px;
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center; 
            color: var(--text-muted); 
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
        }

        select { 
            width: 100%; 
            padding: 14px 16px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color);
            background-color: #fdfdfd;
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236b6b6b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(200, 98, 60, 0.15);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            font-weight: 600; 
            font-size: 15px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer; 
            transition: background 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: translateY(2px);
        }

        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: #fff8f5; /* Oranye sangat muda agar menyatu */
            border-radius: 8px; 
            border-left: 4px solid var(--primary-color); 
        }

        .result-box p {
            margin: 0 0 8px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .result-box strong {
            color: var(--text-dark);
        }

        .price-label {
            margin-top: 15px !important;
            font-weight: 600;
            color: var(--text-dark) !important;
        }

        .price { 
            font-size: 26px; 
            font-weight: 700; 
            color: var(--primary-color); 
            margin-top: 5px;
        }

        .btn-back { 
            display: inline-block;
            width: 100%;
            text-align: center; 
            margin-top: 20px; 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .btn-back:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="card">
    <h2 class="brand-title">Cek Ongkos Kirim</h2>
    <p class="subtitle">Pengiriman dari Pusat Kota Medan</p>

    <form th:action="@{/ongkir/hitung}" method="post">
        <div class="form-group">
            <label for="lokasiDropdown">Pilih Lokasi Tujuan</label>
            <select name="jarakKm" id="lokasiDropdown" required onchange="updateNamaLokasi()">
                <option value="" disabled selected>-- Pilih Kecamatan/Kota --</option>
                <option th:each="lokasi : ${daftarLokasi}" 
                        th:value="${lokasi.jarakKm}" 
                        th:text="${lokasi.nama} + ' (' + ${lokasi.jarakKm} + ' km)'"
                        th:data-nama="${lokasi.nama}"></option>
            </select>
        </div>
        
        <input type="hidden" name="namaLokasi" id="namaLokasiHidden">
        
        <button type="submit">Hitung Biaya Pengiriman</button>
    </form>

    <div class="result-box" th:if="${totalOngkir != null}">
        <p>Tujuan: <strong th:text="${lokasiTerpilih}"></strong></p>
        <p>Jarak: <strong th:text="${jarakTerpilih} + ' km'"></strong></p>
        <p class="price-label">Total Ongkos Kirim:</p>
        <div class="price" th:text="'Rp ' + ${#numbers.formatDecimal(totalOngkir, 0, 'COMMA', 0, 'POINT')}">Rp 0</div>
    </div>

    <a href="/dashboard/pembeli" class="btn-back">← Kembali ke Dashboard</a>
</div>

<script>
    function updateNamaLokasi() {
        var dropdown = document.getElementById("lokasiDropdown");
        var selectedOption = dropdown.options[dropdown.selectedIndex];
        document.getElementById("namaLokasiHidden").value = selectedOption.getAttribute("data-nama");
    }
</script>

</body>
</html>
