<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cek Ongkir - POTTE HOUSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh;}
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 400px; text-align: center; }
        .card h2 { color: #2c3e50; margin-top: 0; }
        .card p { color: #888; font-size: 14px; margin-bottom: 25px; }
        select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 15px; font-size: 15px;}
        .btn-check { background: #d35400; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-check:hover { background: #b03a00; }
        .back-link { display: inline-block; margin-top: 20px; color: #0095da; text-decoration: none; font-size: 14px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-motorcycle" style="color: #d35400;"></i> Estimasi Ongkir</h2>
        <p>Pengiriman dari POTTE HOUSE (Jl. Dr. Mansyur No.98)</p>
        
        <select>
            <option>Kec. Medan Selayang - Rp 5.000</option>
            <option>Kec. Medan Baru / USU - Rp 7.000</option>
            <option>Kec. Medan Sunggal - Rp 9.000</option>
            <option>Kec. Medan Johor - Rp 12.000</option>
        </select>
        
        <button class="btn-check">Cek Harga</button>
        <a href="/dashboard/pembeli" class="back-link">Kembali ke Menu</a>
    </div>
</body>
</html>
