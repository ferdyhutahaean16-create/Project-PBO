<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Stok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>📦 Manajemen Stok & Inventari</h2>
    <p class="text-muted">Kelola stok produk oleh-oleh Medan.</p>

    <div th:if="${sukses}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${sukses}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${not #lists.isEmpty(stokHampirHabis)}" class="alert alert-warning">
        ⚠️ <strong>Stok hampir habis (≤5):</strong>
        <span th:each="p, i : ${stokHampirHabis}">
            <strong th:text="${p.name}"></strong><span th:if="${!i.last}">, </span>
        </span>
    </div>

    <a href="/stok/tambah" class="btn btn-primary mb-3">+ Tambah Produk</a>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nama Produk</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p, i : ${produkList}">
                <td th:text="${i.count}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.category}"></td>
                <td th:text="'Rp ' + ${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${p.stock}"></td>
                <td>
                    <span th:if="${p.stock <= 0}" class="badge bg-danger">Habis</span>
                    <span th:if="${p.stock > 0 and p.stock <= 5}" class="badge bg-warning text-dark">Hampir Habis</span>
                    <span th:if="${p.stock > 5}" class="badge bg-success">Tersedia</span>
                </td>
                <td>
                    <a th:href="@{/stok/update/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Update</a>

                    <form th:action="@{/stok/tambah-stok/{id}(id=${p.id})}" method="post" class="d-inline">
                        <input type="hidden" name="jumlah" value="10">
                        <button type="submit" class="btn btn-sm btn-success">+10</button>
                    </form>

                    <form th:action="@{/stok/hapus/{id}(id=${p.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Yakin hapus produk ini?')">
                        <button type="submit" class="btn btn-sm btn-danger">Hapus</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(produkList)}">
                <td colspan="7" class="text-center text-muted">Belum ada produk.</td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
