<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tracking Pesanan - Kuliner Medan</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .order-item { border-left: 5px solid #007bff; padding: 15px; margin-bottom: 15px; background: #f8f9fa; border-radius: 4px; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; color: white; }
        .bg-dikemas { background-color: #ffc107; color: black; }
        .bg-diperjalanan { background-color: #17a2b8; }
        .bg-sampai { background-color: #28a745; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Status Pesanan Saya 📦</h2>
        <a href="/dashboard/pembeli" style="color: #007bff; text-decoration: none; margin-bottom: 15px; display: inline-block;">&larr; Kembali ke Dashboard</a>

        <div th:each="order : ${orders}" class="order-item">
            <h4 style="margin: 0 0 10px 0;">Order ID: #KM-<span th:text="${order.id}"></span></h4>
            <p style="margin: 5px 0;">Total Belanja: <strong>Rp <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span></strong></p>
            <p style="margin: 5px 0;">Status Saat Ini: 
                <span th:classappend="${order.status.name() == 'DIKEMAS' ? 'bg-dikemas' : (order.status.name() == 'DIPERJALANAN' ? 'bg-diperjalanan' : 'bg-sampai')}" 
                      class="status-badge" th:text="${order.status}">
                </span>
                <div th:if="${order.status.name() == 'SAMPAI'}" style="margin-top: 15px;">
                    <a th:href="@{'/ulasan/tulis/' + ${order.id}}" class="status-badge" style="background-color: #fd7e14; text-decoration: none;">⭐ Beri Ulasan Kepuasan</a>
                </div>
            </p>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" style="text-align: center; color: #666; padding: 20px;">
            Anda belum memiliki riwayat pesanan.
        </div>
    </div>
</body>
</html>
